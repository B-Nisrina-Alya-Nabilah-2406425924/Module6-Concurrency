<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Lost in Memory 🦀</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
    :root {
        --rust: #CE422B;
        --rust-dark: #A63520;
        --rust-light: #F28B74;
        --cream: #FFF8F0;
        --yellow: #FFD166;
        --navy: #1A1A2E;
        --teal: #06D6A0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Nunito', sans-serif;
        background-color: var(--navy);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
        );
        pointer-events: none;
        z-index: 100;
    }

    .stars {
        position: fixed;
        inset: 0;
        z-index: 0;
    }
    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        animation: twinkle var(--d, 3s) ease-in-out infinite;
        opacity: var(--o, 0.5);
    }
    @keyframes twinkle {
        0%, 100% { opacity: var(--o, 0.5); transform: scale(1); }
        50%       { opacity: 0.1; transform: scale(0.5); }
    }

    .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.15;
        z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--rust); top: -150px; left: -150px; }
    .blob-2 { width: 350px; height: 350px; background: #6C3483; bottom: -100px; right: -100px; }

    .card {
        position: relative;
        z-index: 1;
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 32px;
        padding: 56px 64px;
        max-width: 560px;
        width: 90%;
        text-align: center;
        box-shadow:
        0 4px 0 4px var(--rust-dark),
        0 0 80px rgba(206,66,43,0.2),
        0 30px 60px rgba(0,0,0,0.4);
        animation: pop-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop-in {
        from { opacity: 0; transform: scale(0.7) translateY(40px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .glitch-wrap {
        position: relative;
        margin-bottom: 8px;
        animation: slide-up 0.5s 0.2s ease both;
    }

    .glitch {
        font-family: 'Fredoka One', cursive;
        font-size: 7rem;
        color: var(--rust-light);
        position: relative;
        display: inline-block;
        text-shadow: 0 0 30px rgba(242,139,116,0.5);
    }

    .glitch::before,
    .glitch::after {
        content: '404';
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
    }
    .glitch::before {
        color: var(--teal);
        animation: glitch-1 3s infinite;
        clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }
    .glitch::after {
        color: var(--yellow);
        animation: glitch-2 3s infinite;
        clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }

    @keyframes glitch-1 {
        0%, 90%, 100% { transform: translate(0); }
        92%            { transform: translate(-4px, 2px); }
        94%            { transform: translate(4px, -2px); }
        96%            { transform: translate(-2px, 0); }
    }
    @keyframes glitch-2 {
        0%, 90%, 100% { transform: translate(0); }
        93%            { transform: translate(4px, 2px); }
        95%            { transform: translate(-4px, -2px); }
        97%            { transform: translate(2px, 0); }
    }

    .crab {
        font-size: 64px;
        display: block;
        margin-bottom: 12px;
        animation: wobble 4s ease-in-out infinite;
        filter: drop-shadow(0 8px 16px rgba(206,66,43,0.4));
    }
    @keyframes wobble {
        0%, 100% { transform: rotate(-8deg) scale(1); }
        25%       { transform: rotate(8deg) scale(1.05); }
        50%       { transform: rotate(-4deg) scale(0.97); }
        75%       { transform: rotate(6deg) scale(1.03); }
    }

    h1 {
        font-family: 'Fredoka One', cursive;
        font-size: 1.9rem;
        color: #FFF;
        margin-bottom: 10px;
        animation: slide-up 0.5s 0.4s ease both;
    }

    .subtitle {
        color: rgba(255,255,255,0.5);
        font-size: 0.95rem;
        margin-bottom: 32px;
        line-height: 1.7;
        animation: slide-up 0.5s 0.55s ease both;
    }
    .subtitle strong { color: var(--rust-light); }

    @keyframes slide-up {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .error-box {
        background: rgba(0,0,0,0.35);
        border: 1px solid rgba(255,255,255,0.08);
        border-left: 3px solid var(--rust);
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 28px;
        text-align: left;
        font-family: 'Courier New', monospace;
        font-size: 0.82rem;
        color: rgba(255,255,255,0.6);
        animation: slide-up 0.5s 0.7s ease both;
        line-height: 1.8;
    }
    .error-box .err { color: var(--rust-light); font-weight: bold; }
    .error-box .ok  { color: var(--teal); }
    .error-box .warn{ color: var(--yellow); }

    .rust-msg {
        background: rgba(206,66,43,0.12);
        border: 1px solid rgba(206,66,43,0.3);
        border-radius: 16px;
        padding: 18px 22px;
        margin-bottom: 28px;
        text-align: left;
        animation: slide-up 0.5s 0.85s ease both;
    }
    .rust-msg .label {
        font-family: 'Fredoka One', cursive;
        font-size: 0.75rem;
        color: var(--rust-light);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 6px;
    }
    .rust-msg p {
        color: rgba(255,255,255,0.7);
        font-size: 0.88rem;
        line-height: 1.6;
    }
    .rust-msg strong { color: #FFF; }

    .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--rust), var(--rust-dark));
        color: #FFF;
        font-family: 'Nunito', sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        text-decoration: none;
        padding: 12px 28px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 0 var(--rust-dark), 0 8px 20px rgba(206,66,43,0.4);
        transition: transform 0.15s, box-shadow 0.15s;
        animation: slide-up 0.5s 1s ease both;
    }
    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 0 var(--rust-dark), 0 12px 28px rgba(206,66,43,0.5);
    }
    .btn:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 var(--rust-dark), 0 4px 12px rgba(206,66,43,0.3);
    }

    .tag {
        display: block;
        margin-top: 24px;
        color: rgba(255,255,255,0.25);
        font-size: 0.75rem;
        letter-spacing: 1px;
        animation: slide-up 0.5s 1.1s ease both;
    }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">

    <span class="crab">🦀</span>

    <div class="glitch-wrap">
        <span class="glitch">404</span>
    </div>

    <h1>Page Not Found!</h1>
    <p class="subtitle">
        Looks like this page has been <strong>dropped</strong>.<br>
        The borrow checker couldn't find it either.
    </p>

    <a class="btn" href="/">
        ⬅ Go back home
    </a>

    <span class="tag">🎓 Advanced Programming · Fasilkom UI</span>

    </div>

    <script>
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
         const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --d:${(Math.random()*4+2).toFixed(1)}s;
        --o:${(Math.random()*0.6+0.2).toFixed(2)};
        animation-delay:${(Math.random()*4).toFixed(1)}s;
        `;
        container.appendChild(s);
    }
    </script>
</body>
</html>
